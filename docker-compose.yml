version: '3.8'

services:
  backend:
    build: 
      context: ./monolith
    ports:
      - "8080:8080"
    environment:
      - AUTH0_ISSUER_URI=${AUTH0_ISSUER_URI:-https://test.auth0.com/}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-https://api.twitterlike.com}
    networks:
      - twitter-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
        - VITE_API_BASE_URL=http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - twitter-net

networks:
  twitter-net:
    driver: bridge
